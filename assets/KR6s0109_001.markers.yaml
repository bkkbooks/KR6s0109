  - {type: variant, offset: 2329, length: 185, content: '三光天子像一軀

      二十八宿像一軀

      右三光者日月五星名七耀。四四方七星合二十八宿此土之人唯聞名見光。未知其形量。今此耀宿之形像尤祕尤密。實有靈驗。唐國猶不多傳。況乎日朝所未曾見。但陰陽師等意推作像。以傳式用是不契當耳。今所請像各有可軌也。

      聖者菩提王像一軀

      右菩提王者。大唐山神也。潤州樓山有一比丘。修練禪業現感此神現形表靈受戒修道故名菩提王。隨人祈請加護成願。遂為國鎮人歸也。因茲處處作像人人尊重親見其事甚可軌也。', 甲: '', 乙: '', 丙: ''}
