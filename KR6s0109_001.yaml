body:
  text: 入唐學法沙門常曉言常曉以去承和三年五月銜命留學遠期萬里之外其年漂迴四年亦不果渡海五年六月進發同年八月到淮南城廣綾舘安置孟冬使等入朝常曉不得隨使入京徒留舘裏空經多日至于歲盡勅命未有爰則周遊郡內訪擇師依幸遇栖靈寺灌頂阿闍梨法號文㻮和尚并華林寺三教講論大德元照座主其文㻮和尚則不空三藏弟子兼惠應阿闍梨付法人也妙鉤經律深通密藏法之棟梁國之所歸同年臘月請節度使處分配住栖靈寺文㻮和尚以為師主始學法儀兼往花林寺元照座主邊問本宗義并得文書也然大師尚佛法之流轉歎生民之可拔授我以金剛大法許我以阿闍梨位也膝步知未知接足得不得幸賴國家之大造大師之慈悲學金剛海瑜伽習大元帥祕法斯法也則如來之肝心眾生之父母於國城塹於人筋脈是大元帥者都內不傳於十供奉以外諸州無出於節度使宅以表緣其靈驗不可思議也諸佛菩薩金剛天等像雖在前來此像未曾請來今則大元帥諸身曼荼羅并諸靈像所要文書等請來見到雖云濤波猛沷新羅賊畔越彼厄難平達聖境是則聖力之所能也伏惟皇帝陛下極德如天佛日高轉人之父佛之化悲群生而濡足助佛囑而垂衣以陛下慈育効祥靈像教希自遠新來恰似符契非聖誰測矣常曉本謂果三十年經歷漢里求佛法來事護國家而緣唐朝不聽留住隨使迴歸竊以一喜此法教生而請來不任一喜一懼之至謹附准判官藤原朝臣貞敏奉表以聞并請來法門等目錄一通且以奉進輕黷威嚴伏增戰越常曉誠恐誠惶謹言承和六年九月二日入唐學法沙門傳燈大法師位常曉上表入唐學法沙門常曉謹言上新請來法門并佛像道具事百論疏一部三卷元康法師造三論玄樞一部二卷元康法師造中論三十六門勢疏一卷元康法師造百論疏略記一部二卷義持法師造大佛頂經疏一部六卷弘抗法師造大佛頂經玄贊一部三卷惟慤法師造已上六部依三論宗學頭法師等申求請來凡如來說稱經菩薩說稱論人師說名疏章傳記等何以故唯以佛說經鈍根難解了是故菩薩作論釋此最鈍根之類猶未得精旨因而人師作疏章等細演經論之廣旨於疏師數般但邪正異耳今件疏等釋經論尤微微解義理絕細細此土有名彼實未渡諸學徒等之所疑滯夫以百論者真諦津途在前以嘉祥寺疏解釋文義有少不足今以元康法師疏將定義理也又空有兩宗論真性理大佛頂經以為本模經本雖先來其疏未有於義難決如今以此將正空有兩家諍論義夫一翼若闕空行何飛況乃一乘奧理義與文違不假疏記微微無顯雖有勞載車冀以此俾補乎聖典四分律羯磨疏一部四卷道宣律師撰已上一部依律宗學頭法師等之覓來右律羯磨者眾行手足佛法壽命也律家軌則雖先備來少有不全豈非是文乎然則以此使補其尸羅闕目釋摩訶衍論疏一部三卷法敏法師造已上一部依真言宗傳法阿闍梨等申求來右釋摩訶衍論者橫釋顯教竪括祕藏本論雖先來左右未定今以此疏證彼大乘維摩經疏一部四卷開中道液法師造維摩經釋批一部三卷開中道液法師造維摩經開中疏記一部五卷文襲禪師造維摩經略例一部二卷智深法師造維摩經玄旨一卷漢涌法師造維摩經開中疏科文一卷開中道液法師造維摩經五教義一卷文襲禪師造右維摩經窮微盡化妙絕之稱也造疏之人數般論旨左右詞疎𬍯塞于是至開中液公大宗蕪蔓真極而開今見大唐真典近代興盛講文學義之類總此疏等以為指南是故每寺講淨名典化度白衣以液公疏提撕緇徒皆云雖有論師註疏惠底未足乍學此文法鏡轉明惠燈益照者金剛般若疏一部二卷開中道液法師造也仁王般若經疏二部二卷金剛般若經註一卷金剛藏註金剛般若經註一卷南嶽王潔註右疏等解義妙微行耆那國此等師疏近代多興皆以餘師制為傍以此等疏為正夫以佛教興轉依能宣人圻古請寄新實於經本非所改於義方用相傳告耳千光王佛威德要法一卷六童子威德要法一卷金毘羅童子威德要法一卷大元帥念誦儀軌一卷阿吒薄拘元帥大將上佛陀羅尼經一卷大日經持誦次第儀一卷大毘盧遮那三種悉地法一卷唐梵對歒尊勝真言効天下本一卷北方毘沙門天王念要法經二卷毘補羅天母啟請法護一卷深沙神記并念誦法一卷菩提王記一卷所受學諸尊瑜伽灌頂儀軌等如先渡來無殊更不注之右顯密之法門若學得若未學得其數不少唯當代要有耳至祕密之宗大體與常無相違千光王佛像一軀右恒沙如來有恒沙土隨其本行得稱各異唯佛與佛乃所究盡今千光王佛者此是觀音本師其事灼然此像未見因而請來如件水月觀世音菩薩像一軀右大悲之用化形萬方觀思眾生拔苦與樂故示像相使物生信今見唐朝世人總以為除災因天下以為生福緣也是像此間未流行故請來如件大元帥本身將部曼荼羅一鋪總五十餘身大元帥大悲身像一軀大元帥忿怒身像一軀大元帥化身像一軀右大元帥者如來之教令輪也佛為含情作救作護示大元帥形群邪見形頭破七分眾惡聽名魔道塵散本經云佛告阿難若有國王大臣敬禮誦呪者其人境土無有惡賊怖難災橫疾疫水旱風霜國王倍威德諸民平秦若有城邑村落持此經者莫不蒙利等者又云若國土襄禍雨澤不調以此大元帥呪安四城門上即得風雨順時將鎮國土四方隣歒不起逆心等者然則如法行國長存安寧剎那婦人固得十利不可思議也大元帥之力今見唐朝皆依此為治國之寶勝歒之要是以定自在王菩薩偈讚曰我聞元帥名世間救苦厄一切大神中奇特無有比種種變化身而拔眾生苦我今聞往昔寶不可思議此法也吾朝不多流行以是略要法儀圖像請求息災招福無比法誰非歸依耶大聖千臂千頭金毘羅童子像一軀右金毘羅童子者此釋迦之化現也經云佛在歡喜園中為諸眾生說法是時外道波旬起諸惡障令諸眾生受大苦惱爾時如來密化自身作金毘羅童子調伏外道諸魔於惡世中饒益眾生此法也尤鎮國利物之寶法力之奇特也不思議此像并法儀持明者所祕本朝未見請來如件大聖六童子像一軀右六童子者經云竝是過去諸佛之所化身為救護一切有情故若有國土作此法者即至而現其身護國利人等者今見唐朝世人多修此法其力見奧是靈像此間未有流行因而請來其修行之儀亦甚疎略大聖迦毘羅神王像一軀右神者此是如來化身秦代羅什三藏昔周五天感得此神相隨送來今見唐中皆貴此神為權法護國之憑若有病人稱名即除貧窮之人依願必富靈驗見顯無有一人不歸依者夫佛化從西東流應時利物豈非如來未化乎三光天子像一軀二十八宿像一軀右三光者日月五星名七耀四四方七星合二十八宿此土之人唯聞名見光未知其形量今此耀宿之形像尤祕尤密實有靈驗唐國猶不多傳況乎日朝所未曾見但陰陽師等意推作像以傳式用是不契當耳今所請像各有可軌也聖者菩提王像一軀右菩提王者大唐山神也潤州樓山有一比丘修練禪業現感此神現形表靈受戒修道故名菩提王隨人祈請加護成願遂為國鎮人歸也因茲處處作像人人尊重親見其事甚可軌也深沙神王像一軀右唐代玄奘三藏遠涉五天感得此神此是北方多聞天王化身也今唐國人總重此神救災成益其驗現前無有一人不依行者寺裏人家皆在此神自見靈驗實不思議具事如記文請來如件菩薩像一軀護摩爐壇樣一十五種右像唐朝示現其靈驗奧也人舉歸息災增福無過此者具事如記文請來如件夫至道無言非言不顯真際絕形待形乃悟絕形者是真如三寶示形者其住持三寶也如來本願順機變相大聖慈悲應時濟物經云應以佛身得度者即現佛身乃至八部身得度者即皆現之而為說法等也凡正法之世魔伴無威所以佛化多住慈悲像末之時邪使競興所以如來多形忿怒佛力如是實鎮國利人之寶也受持頂戴福利無極外以摧魔軍內以調伏煩惱諸佛智悲如此傳法阿闍梨耶付物五鈷金剛杵一三鈷金剛杵一銅鈸一具銅鐃一口金剛樹子念珠一貫多羅梵夾一口金剛海三十七尊種子曼荼羅一面君茶壇樣十七種西天供養白疊巾一條西天檀褥一面傳法阿闍梨授弟子灌頂法二卷右道具竝栖靈寺阿闍梨之所傳付也常曉去承和五年仲夏之月隨入唐判官菅原朝臣善主同上第四舶發赴尸那其年六月到揚州著岸八月下旬到淮南大都督府廣綾舘安置同年十二月住栖靈寺大悲持念院隨同寺灌頂阿闍梨文㻮和尚并華林寺三教講論大德元照座主顯密兩法頗以兼習六年正月四日設二百僧齋普供四眾於此日諸寺大德綱維竝臨齋會應供隨喜常曉夜就師邊受學瑜伽晝周諸寺覓問法門則喚即供奉李全等圖繪大元帥將部曼荼羅等諸尊像并寫文書漸有次第二月十九日受傳法阿闍梨位灌頂於此日設大齋普供大眾留後判官藤原朝臣貞敏別請丹墀真人高主知乘安墀宿禰良棟等同臨道場拋花定本尊受五智灌頂二十一日准勅離州却赴本朝常曉本業三論之枝兼真言之條而才能不聞言無取逢時之人簉留學員限以三十年尋以一乘任重人弱夙夜懃愿雖然國命難乖忘親萬里住心遠境且頗受學顯密兩道比未見及太知有勅不聽留住而隨使却迴少間所成此法儀注顯如件承和六年九月五日入唐學法沙門傳燈大法師位常曉上
